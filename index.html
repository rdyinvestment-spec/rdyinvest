<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RDY Investment - Luxury Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- Splash Screen -->
  <div id="splash" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.5s ease">
    <div style="font-size:32px; font-weight:800; color:var(--blue); letter-spacing:4px">RDY</div>
    <div style="font-size:10px; color:var(--text3); text-transform:uppercase; margin-top:8px">Luxury Investment Dashboard</div>
  </div>

  <!-- screen-auth: Aparece se não estiver logado -->
  <div id="screen-auth" style="display:none; min-height:100vh; flex-direction:column; justify-content:center; padding:24px; background:var(--bg)">
    <div style="text-align:center; margin-bottom:40px">
      <div style="font-size:48px; font-weight:800; color:var(--blue); margin-bottom:8px">RDY</div>
      <div style="color:var(--text3)">Acesse sua plataforma profissional</div>
    </div>
    <div class="card" style="max-width:400px; margin: 0 auto; width:100%">
      <input type="email" id="tf-email" class="fi" placeholder="Seu e-mail" />
      <input type="password" id="tf-pass" class="fi" placeholder="Sua senha" />
      <button id="btn-login" class="btn btn-blue">ACESSAR DASHBOARD</button>
    </div>
  </div>

  <!-- screen-app: O App principal -->
  <div id="screen-app" style="display:none; padding-bottom:100px">
    <!-- Header -->
    <header style="padding:20px 16px; position:sticky; top:0; background:rgba(8, 11, 15, 0.8); backdrop-filter:blur(10px); z-index:100">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div style="font-weight:800; font-size:18px; color:var(--blue)">RDY <span style="font-weight:300; color:var(--text)">INVEST</span></div>
        <div style="display:flex; gap:12px">
          <button style="background:none; border:none; color:var(--text3); font-size:20px">🔔</button>
          <div style="width:32px; height:32px; border-radius:50%; background:var(--blue-dim); border:1px solid var(--blue); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700">RD</div>
        </div>
      </div>
    </header>

    <main id="page-content" style="padding:16px"></main>

    <!-- Bottom Nav -->
    <nav class="nav">
      <a href="javascript:void(0)" class="nav-i active" data-page="dashboard" onclick="showPage('dashboard')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="javascript:void(0)" class="nav-i" data-page="calendar" onclick="showPage('calendar')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendário
      </a>
      
      <div class="fab" onclick="onFab()">
        <svg style="width:28px; height:28px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
      </div>

      <a href="javascript:void(0)" class="nav-i" data-page="reports" onclick="showPage('reports')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Relatórios
      </a>
      <a href="javascript:void(0)" class="nav-i" data-page="settings" onclick="showPage('settings')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Perfil
      </a>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    // Simple splash hide for demo
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }
    }, 2000);
  </script>
</body>
</html>
